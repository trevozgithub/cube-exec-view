<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CUBE Exec View – Incidents</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #0052CC; --brand-dark: #003785; --brand-light: #E6EEFF;
      --green: #1D7A3A; --green-bg: #E3F5E9;
      --amber: #B45309; --amber-bg: #FEF3C7;
      --red: #B91C1C; --red-bg: #FEE2E2;
      --grey: #6B7280; --border: #E5E7EB;
      --surface: #F9FAFB; --white: #FFFFFF; --text: #111827; --text-light: #6B7280;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--surface); color: var(--text); font-size: 13px; line-height: 1.5; }

    /* NAV */
    .topnav { background: var(--brand-dark); color: #fff; display: flex; align-items: center; gap: 24px; padding: 0 28px; height: 52px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.18); }
    .topnav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
    .topnav-logo svg { width: 28px; height: 28px; }
    .topnav-divider { width: 1px; height: 28px; background: rgba(255,255,255,.25); }
    .topnav-tabs { display: flex; gap: 4px; flex: 1; overflow-x: auto; scrollbar-width: none; }
    .topnav-tabs::-webkit-scrollbar { display: none; }
    .topnav-tab { color: rgba(255,255,255,.75); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: background .15s; }
    .topnav-tab:hover { background: rgba(255,255,255,.12); color: #fff; }
    .topnav-tab.active { background: rgba(255,255,255,.18); color: #fff; }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .topnav-date { font-size: 12px; color: rgba(255,255,255,.6); }
    .jira-link { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.15); color: #fff; padding: 5px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 500; transition: background .15s; }
    .jira-link:hover { background: rgba(255,255,255,.25); }

    /* PAGE HEADER */
    .page-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 18px 28px 14px; }
    .page-header h1 { font-size: 20px; font-weight: 700; color: var(--brand-dark); margin-bottom: 4px; }
    .page-header .subtitle { font-size: 13px; color: var(--text-light); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .filter-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--brand-light); color: var(--brand); padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .live-badge { display: inline-flex; align-items: center; gap: 5px; background: #ECFDF5; color: #065F46; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .refresh-btn { display: inline-flex; align-items: center; gap: 5px; background: none; border: 1px solid var(--border); color: var(--brand); padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background .12s; }
    .refresh-btn:hover { background: var(--brand-light); }
    .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MAIN */
    .main { padding: 20px 28px; max-width: 1700px; margin: 0 auto; }

    /* LOADING */
    .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-text { color: var(--text-light); font-size: 14px; }
    .error-box { background: var(--red-bg); border: 1px solid #FECACA; border-radius: 8px; padding: 16px 20px; color: var(--red); font-size: 13px; }

    /* SECTION DIVIDER */
    .section-divider { display: flex; align-items: center; gap: 12px; margin: 28px 0 16px; }
    .section-divider h2 { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; }
    .section-divider .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-divider .section-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
    .badge-techops { background: #FEE2E2; color: #B91C1C; }
    .badge-esentire { background: #EDE9FE; color: #6D28D9; }

    /* KPI */
    .kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .kpi-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .kpi-icon.total   { background: var(--brand-light); }
    .kpi-icon.green   { background: var(--green-bg); }
    .kpi-icon.amber   { background: var(--amber-bg); }
    .kpi-icon.red     { background: var(--red-bg); }
    .kpi-icon.purple  { background: #EDE9FE; }
    .kpi-icon.blue    { background: #DBEAFE; }
    .kpi-body { flex: 1; min-width: 0; }
    .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
    .kpi-label { font-size: 12px; color: var(--text-light); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kpi-pct { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; align-self: flex-start; white-space: nowrap; }
    .kpi-pct.green  { background: var(--green-bg); color: var(--green); }
    .kpi-pct.amber  { background: var(--amber-bg); color: var(--amber); }
    .kpi-pct.red    { background: var(--red-bg);   color: var(--red); }
    .kpi-pct.blue   { background: var(--brand-light); color: var(--brand); }
    .kpi-pct.purple { background: #EDE9FE; color: #6D28D9; }
    .kpi-pct.grey   { background: #F3F4F6; color: #6B7280; }

    /* CHARTS */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 14px; margin-bottom: 20px; }
    .charts-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .chart-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .chart-card h3 { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 185px; }
    .chart-wrap-bar { position: relative; height: 210px; }

    /* TABLE SECTION */
    .timeline-section { background: var(--white); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.05); overflow: hidden; margin-bottom: 20px; }
    .timeline-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 12px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .timeline-header h2 { font-size: 15px; font-weight: 700; }
    .tl-controls { display: flex; align-items: center; gap: 8px; }
    .tl-btn { border: 1px solid var(--border); background: var(--white); color: var(--text); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 5px; text-decoration: none; transition: background .12s; }
    .tl-btn:hover { background: var(--surface); }
    .tl-btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .tl-btn.primary:hover { background: var(--brand-dark); }
    .legend { display: flex; gap: 14px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-light); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

    /* TABLE */
    .tl-table-wrap { overflow-x: auto; }
    table.tl-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    table.tl-table thead th { background: #F3F4F6; color: var(--text-light); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    table.tl-table tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    table.tl-table tbody tr:hover { background: #F9FAFB; }
    table.tl-table tbody td { padding: 9px 12px; vertical-align: middle; }
    .row-num { color: var(--text-light); font-size: 11px; text-align: center; }
    .wi-cell { display: flex; align-items: center; gap: 8px; min-width: 280px; max-width: 420px; }
    .wi-key { font-size: 11px; color: var(--brand); font-weight: 600; white-space: nowrap; text-decoration: none; }
    .wi-key:hover { text-decoration: underline; }
    .wi-summary { color: var(--text); font-weight: 500; line-height: 1.35; }

    /* INCIDENT TABLE CELLS */
    .inc-summary-cell { min-width: 260px; max-width: 400px; }

    /* STATUS BADGES */
    .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: .3px; white-space: nowrap; text-transform: uppercase; }
    .status-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .s-plr { background: #EDE9FE; color: #6D28D9; }
    .s-or  { background: #D1FAE5; color: #065F46; }
    .s-bt  { background: #DBEAFE; color: #1E40AF; }
    .s-sc  { background: #FEF3C7; color: #92400E; }
    .s-pl  { background: #F3F4F6; color: #374151; }
    .s-ns  { background: #F3F4F6; color: #6B7280; }
    /* eSentire statuses */
    .s-todo       { background: #F3F4F6; color: #374151; }
    .s-inprogress { background: #DBEAFE; color: #1E40AF; }
    .s-actioned   { background: #FEF3C7; color: #92400E; }
    .s-completed  { background: #D1FAE5; color: #065F46; }

    /* PRIORITY BADGES */
    .prio-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .prio-p1 { background: #FEE2E2; color: #B91C1C; }
    .prio-p2 { background: #FFEDD5; color: #C2410C; }
    .prio-p3 { background: #FEF3C7; color: #B45309; }
    .prio-p4 { background: #DBEAFE; color: #1D4ED8; }
    .prio-p5 { background: #F3F4F6; color: #6B7280; }

    /* ISSUE TYPE BADGES */
    .type-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .type-alert    { background: #FEE2E2; color: #B91C1C; }
    .type-incident { background: #EDE9FE; color: #6D28D9; }
    .type-other    { background: #F3F4F6; color: #374151; }

    /* RAG */
    .rag-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .rag-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .rag-green { background: var(--green-bg); color: var(--green); }
    .rag-green .dot { background: #22C55E; }
    .rag-amber { background: var(--amber-bg); color: var(--amber); }
    .rag-amber .dot { background: #F59E0B; }
    .rag-red   { background: var(--red-bg);   color: var(--red); }
    .rag-red   .dot { background: #EF4444; }
    .rag-grey  { background: #F3F4F6; color: #6B7280; }
    .rag-grey  .dot { background: #9CA3AF; }

    /* OTHER CELLS */
    .date-cell { white-space: nowrap; }
    .date-overdue { color: var(--red); font-weight: 600; }
    .q-badge { display: inline-block; background: var(--brand-light); color: var(--brand); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .assignee-cell { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }

    /* GANTT */
    .gantt-col { width: 240px; min-width: 200px; }
    .gantt-bar-wrap { height: 22px; background: #F3F4F6; border-radius: 3px; position: relative; overflow: hidden; }
    .gantt-bar { position: absolute; top: 3px; height: 16px; border-radius: 3px; min-width: 6px; }
    .gantt-bar.green { background: #22C55E; }
    .gantt-bar.amber { background: #F59E0B; }
    .gantt-bar.red   { background: #EF4444; }
    .gantt-bar.grey  { background: #9CA3AF; }
    .gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--brand); opacity: .7; }

    /* FOOTER */
    .tl-footer { padding: 10px 18px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-light); }
    .tl-footer a { color: var(--brand); text-decoration: none; font-weight: 600; }
    .tl-footer a:hover { text-decoration: underline; }

    /* SEARCH */
    .search-input { border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; width: 180px; outline: none; }
    .search-input:focus { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-light); }

    @media (max-width: 1400px) { .kpi-row { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1100px) { .charts-row,.charts-row-3 { grid-template-columns: 1fr 1fr; } .kpi-row { grid-template-columns: repeat(2, 1fr); } .kpi-row-3 { grid-template-columns: repeat(2, 1fr); } }

    /* DETAIL DRAWER */
    .clickable-row { cursor: pointer; }
    .clickable-row:hover { background: #EEF2FF !important; }
    .detail-drawer {
      position: fixed; right: 0; top: 52px; bottom: 0; width: 420px;
      background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,.15);
      z-index: 500; overflow-y: auto; padding: 20px 24px;
      transform: translateX(100%); transition: transform .22s ease;
    }
    .detail-drawer.open { transform: translateX(0); }
    .drawer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.18); z-index: 499;
    }
    .drawer-overlay.open { display: block; }
    .drawer-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #E5E7EB;
    }
    .drawer-key   { font-size: 11px; color: var(--brand); font-weight: 700; }
    .drawer-title { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 4px; max-width: 340px; line-height: 1.4; }
    .drawer-close { border: none; background: none; cursor: pointer; font-size: 20px; color: #9CA3AF; padding: 0 4px; }
    .drawer-close:hover { color: #111827; }
    .jira-panel   { border-radius: 4px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; border-left: 4px solid; line-height: 1.55; }
    .jira-panel .panel-icon { font-size: 15px; margin-bottom: 6px; display: block; }
    .jira-panel.info    { background: #DEEBFF; border-color: #0052CC; color: #0747A6; }
    .jira-panel.note    { background: #EAE6FF; border-color: #5243AA; color: #403294; }
    .jira-panel.warning { background: #FFFAE6; border-color: #FF8B00; color: #7A5200; }
    .jira-panel.error   { background: #FFEBE6; border-color: #DE350B; color: #BF2600; }
    .jira-panel.success { background: #E3FCEF; border-color: #00875A; color: #006644; }
    .drawer-empty { color: #9CA3AF; font-size: 13px; text-align: center; padding: 32px 0; }
    .drawer-jira-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; font-size: 12px; color: var(--brand); text-decoration: none; }
    .drawer-jira-link:hover { text-decoration: underline; }

    /* WEEKLY SUMMARY CARD */
    .ws-wrap { background:#F7F3EC; border:1px solid #C8B89A; border-radius:6px; padding:28px 32px 20px; margin-bottom:24px; }
    .ws-header { display:flex; justify-content:space-between; align-items:flex-start; padding-bottom:20px; border-bottom:2px solid #1C2D4F; margin-bottom:20px; }
    .ws-brand-main { font-family:'Courier New',monospace; font-size:22px; font-weight:700; color:#1C2D4F; letter-spacing:1.5px; line-height:1; margin-bottom:4px; }
    .ws-brand-sub { font-size:46px; font-weight:900; color:#C93B00; font-style:italic; line-height:1; font-family:Georgia,serif; }
    .ws-meta { text-align:right; }
    .ws-meta-row { font-size:9px; font-weight:700; color:#9CA3AF; letter-spacing:.9px; text-transform:uppercase; margin-top:10px; margin-bottom:1px; }
    .ws-meta-val { font-size:13px; font-weight:600; color:#1C2D4F; }
    .ws-kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); border:2px solid #1C2D4F; border-radius:3px; overflow:hidden; margin-bottom:18px; }
    .ws-kpi { padding:18px 20px; background:#fff; border-right:1px solid #D1C7B6; }
    .ws-kpi:last-child { border-right:none; }
    .ws-kpi-num { font-size:54px; font-weight:700; line-height:1; display:block; font-family:-apple-system,sans-serif; }
    .ws-kpi.kpi-total .ws-kpi-num { color:#1C2D4F; }
    .ws-kpi.kpi-open .ws-kpi-num { color:#C93B00; }
    .ws-kpi.kpi-closed .ws-kpi-num { color:#16A34A; }
    .ws-kpi.kpi-action .ws-kpi-num { color:#1C2D4F; }
    .ws-kpi-lbl { font-size:9px; font-weight:700; color:#9CA3AF; text-transform:uppercase; letter-spacing:.7px; margin-top:5px; display:block; font-family:-apple-system,sans-serif; }
    .ws-narrative { background:#1C2D4F; color:#D8D0C0; padding:16px 20px; border-radius:3px; font-size:13px; line-height:1.75; margin-bottom:14px; }
    .ws-narrative strong { color:#fff; }
    .ws-note { background:#FEFBE8; border:1px solid #D4A017; border-left:4px solid #D4A017; padding:12px 16px; border-radius:3px; font-size:12.5px; line-height:1.65; margin-bottom:14px; color:#5C4A00; }
    .ws-note strong { color:#3D2F00; }
    .ws-bottom { display:grid; grid-template-columns:1fr 1fr; gap:24px; padding-top:16px; border-top:1px solid #C8B89A; margin-top:6px; }
    .ws-section-title { font-size:9px; font-weight:700; color:#9CA3AF; text-transform:uppercase; letter-spacing:.9px; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #C8B89A; font-family:-apple-system,sans-serif; }
    .ws-section-title span { color:#C93B00; font-weight:700; }
    .ws-cat-row { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid #EDE8DF; font-size:12.5px; }
    .ws-cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .ws-cat-label { flex:1; color:#374151; }
    .ws-cat-count { font-weight:700; color:#1C2D4F; font-size:14px; }
    .ws-ticket-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:2px; }
    .ws-ticket-chip { display:inline-block; padding:5px 12px; background:#E8E3DA; color:#1C2D4F; font-family:'Courier New',monospace; font-size:12px; font-weight:700; border-radius:3px; text-decoration:none; border:1px solid #C8B89A; transition:background .12s; }
    .ws-ticket-chip:hover { background:#D4C8B0; }
    .ws-footer { display:flex; justify-content:space-between; margin-top:16px; padding-top:12px; border-top:1px solid #C8B89A; font-size:10px; color:#9CA3AF; }
    .ws-empty { color:#9CA3AF; font-size:12px; font-style:italic; padding:8px 0; }
    /* ANALYTICS SECTION LABEL */
    .analytics-label { font-size:11px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:.6px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="white" fill-opacity="0.15"/><path d="M6 8h6v6H6V8zm10 0h6v6h-6V8zM6 18h6v4H6v-4zm10-4h6v8h-6v-8z" fill="white"/></svg>
    Cube Technology Initiatives
  </div>
  <div class="topnav-divider"></div>
  <div class="topnav-tabs" id="navTabs"></div>
  <div class="topnav-right">
    <span class="topnav-date" id="navDate"></span>
    <a class="jira-link" href="https://cube001.atlassian.net/jira/dashboards/11367" target="_blank" rel="noopener">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H3a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V3a2 2 0 00-2-2zm-1 11H4V4h8v8z"/></svg>
      Open in Jira
    </a>
  </div>
<script src="nav2.js"></script>
</nav>

<div class="page-header">
  <h1>🚨 Incidents</h1>
  <div class="subtitle">
    <span>eSentire MDR Security Intelligence</span>
    <span class="filter-chip" style="background:#EDE9FE;color:#6D28D9">eSentire MDR</span>
    <span id="itemCount">Loading...</span>
    <span class="live-badge"><span class="live-dot"></span>Live data</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData(true)">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" id="refreshIcon"><path d="M13.6 2.4A7 7 0 102.4 13.6M14 1v4h-4"/></svg>
      Refresh
    </button>
    <span id="lastUpdated" style="margin-left:auto; font-size:11px;"></span>
  </div>
</div>

<div class="main">
  <div id="content">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading live Jira data...</div>
    </div>
  </div>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<div id="detailDrawer" class="detail-drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-key" id="drawerKey"></div>
      <div class="drawer-title" id="drawerTitle"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawerPanels"></div>
</div>

<script>
const ESENTIRE_URL = 'https://cube001.atlassian.net/jira/dashboards/15636';
const JIRA_BASE    = 'https://cube001.atlassian.net/browse/';

/* ─── Helpers ───────────────────────────────────────────────── */
function fmtD(d) { return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDate(s) { if(!s) return '—'; return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDatetime(s) { if(!s) return '—'; return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
const isOpen = it => { const s=(it.status||'').toLowerCase(); return !s.includes('complet')&&!s.includes('closed')&&!s.includes('resolved'); };
function avatarColor(n) { return '#'+Math.abs((n||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)).toString(16).slice(0,6).padEnd(6,'3'); }
function initials(n) { if(!n||n==='Unassigned') return '?'; return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function esentireStatusClass(s) { if(!s) return 's-todo'; const l=s.toLowerCase(); if(l.includes('in progress')) return 's-inprogress'; if(l.includes('action')) return 's-actioned'; if(l.includes('complet')) return 's-completed'; return 's-todo'; }
function prioClass(p) { if(!p) return 'prio-p5'; const l=p.toUpperCase(); if(l==='P1'||l==='HIGHEST') return 'prio-p1'; if(l==='P2'||l==='HIGH') return 'prio-p2'; if(l==='P3'||l==='MEDIUM') return 'prio-p3'; if(l==='P4'||l==='LOW') return 'prio-p4'; return 'prio-p5'; }
function typeClass(t) { if(!t) return 'type-other'; const l=t.toLowerCase(); if(l.includes('alert')) return 'type-alert'; if(l.includes('incident')) return 'type-incident'; return 'type-other'; }

/* ─── Charts ────────────────────────────────────────────────── */
let chartInstances=[];
function destroyCharts(){ chartInstances.forEach(c=>c.destroy()); chartInstances=[]; }
function makeDonut(id,labels,data,colors){
  chartInstances.push(new Chart(document.getElementById(id),{
    type:'doughnut',
    data:{ labels, datasets:[{data,backgroundColor:colors,borderWidth:3,borderColor:'#fff',hoverOffset:6}] },
    options:{ responsive:true,maintainAspectRatio:false,cutout:'68%',
      plugins:{ legend:{ position:'right',
        labels:{ font:{size:11},boxWidth:10,padding:6,
          generateLabels:c=>c.data.labels.map((l,i)=>({text:`${l} (${c.data.datasets[0].data[i]})`,fillStyle:c.data.datasets[0].backgroundColor[i],strokeStyle:'#fff',lineWidth:2,index:i}))
        }
      }}
    }
  }));
}

/* ─── Render ────────────────────────────────────────────────── */
function render(esentireData) {
  destroyCharts();
  const incItems = esentireData.items || [];
  const dataUpdated = esentireData.updated ? new Date(esentireData.updated) : new Date();

  /* Weekly window */
  const weekEnd   = dataUpdated;
  const weekStart = new Date(weekEnd.getTime() - 7*24*60*60*1000);
  const weekItems = incItems.filter(it => {
    if (!it.created) return false;
    return new Date(it.created+'T00:00:00') >= weekStart;
  });
  const weekTotal  = weekItems.length;
  const weekOpen   = weekItems.filter(isOpen).length;
  const weekClosed = weekTotal - weekOpen;
  const weekAction = weekOpen;

  /* 30-day counts for charts */
  const prioCounts={}, incStatusCounts={}, typeCounts={};
  incItems.forEach(it=>{
    const p=it.priority||'Unknown'; prioCounts[p]=(prioCounts[p]||0)+1;
    const s=it.status||'Unknown';   incStatusCounts[s]=(incStatusCounts[s]||0)+1;
    const t=it.issuetype||'Unknown';typeCounts[t]=(typeCounts[t]||0)+1;
  });

  /* Category breakdown from labels */
  const CAT_COLORS={'Phishing':'#EF4444','Suspicious User Activity':'#F97316','Login from Unusual Location':'#3B82F6','Admin Activity':'#1C2D4F','Admin-Activity':'#1C2D4F','Service Incident':'#7C3AED','Alert':'#EF4444','Other':'#6B7280'};
  const catCounts={};
  weekItems.forEach(it=>{
    const cats=(it.labels&&it.labels.length)?it.labels:[it.issuetype||'Other'];
    cats.forEach(c=>{ catCounts[c]=(catCounts[c]||0)+1; });
  });
  const catEntries=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);

  /* High-priority open for investigation note */
  const highPrioOpen=weekItems.filter(it=>{
    const p=(it.priority||'').toUpperCase();
    return (p==='P1'||p==='P2'||p==='HIGHEST'||p==='HIGH')&&isOpen(it);
  });

  /* Narrative */
  let volumeDesc='a steady volume';
  if(weekTotal===0) volumeDesc='no new alerts';
  else if(weekTotal<=3) volumeDesc='a lower volume';
  else if(weekTotal>=12) volumeDesc='a higher than usual volume';
  const notable=weekItems.filter(it=>{ const p=(it.priority||'').toUpperCase(); return p==='P1'||p==='P2'||p==='HIGHEST'||p==='HIGH'; }).slice(0,3);
  let notableText='';
  if(notable.length>0){
    const nl=notable.map(it=>{
      const cat=(it.labels&&it.labels[0])?it.labels[0]:(it.issuetype||'incident');
      const sm=it.summary.length>55?it.summary.slice(0,55)+'…':it.summary;
      return `a <strong>${cat}</strong> alert (<strong>${it.key}</strong> — ${sm}, currently ${it.status})`;
    });
    notableText=' Notable tickets include '+(nl.length===1?nl[0]:nl.slice(0,-1).join(', ')+', and '+nl[nl.length-1])+'.';
  }
  const narrative = weekTotal===0
    ? `No new incidents were recorded during the week of <strong>${fmtD(weekStart)} – ${fmtD(weekEnd)}</strong>. All previous tickets have been resolved or are under ongoing monitoring.`
    : `During the week of <strong>${fmtD(weekStart)} – ${fmtD(weekEnd)}</strong>, eSentire raised <strong>${weekTotal} alert${weekTotal!==1?'s':''}</strong> against the Cube environment — ${volumeDesc} compared to recent weeks.${notableText} <strong>${weekOpen} ticket${weekOpen!==1?'s remain':' remains'} open</strong> and require${weekOpen===1?'s':''} triage or confirmation of resolution.`;

  const investigationNote = highPrioOpen.length>0
    ? `<div class="ws-note"><strong>&#9632; NOTE — High Priority Alerts (Under Investigation):</strong> ${highPrioOpen.map(it=>`<strong>${it.key}</strong> (${it.summary})`).join('; ')} remain <strong>under active investigation</strong>. The Information Security team continues to monitor and work towards resolution. Malicious activity cannot be ruled out until each investigation concludes.</div>`
    : '';

  const catHTML = catEntries.length>0
    ? catEntries.map(([cat,count])=>`<div class="ws-cat-row"><span class="ws-cat-dot" style="background:${CAT_COLORS[cat]||'#6B7280'}"></span><span class="ws-cat-label">${cat}</span><span class="ws-cat-count">${count}</span></div>`).join('')
    : '<div class="ws-empty">No category data available for this week</div>';

  const openWeekTickets=weekItems.filter(isOpen);
  const openHTML = openWeekTickets.length>0
    ? `<div class="ws-ticket-grid">${openWeekTickets.slice(0,12).map(it=>`<a class="ws-ticket-chip" href="${it.url}" target="_blank" rel="noopener">${it.key}</a>`).join('')}</div>`
    : '<div class="ws-empty">No open tickets this week</div>';

  /* ─── Incident table rows ────────────────────────────────── */
  const incRows=incItems.map((it,idx)=>{
    const ac=avatarColor(it.assignee||'Unassigned');
    const init=initials(it.assignee||'Unassigned');
    return `<tr data-inc-key="${it.key}">
      <td class="row-num">${idx+1}</td>
      <td><div class="wi-cell"><a class="wi-key" href="${JIRA_BASE}${it.key}" target="_blank" rel="noopener">${it.key}</a><span class="wi-summary inc-summary-cell">${it.summary}</span></div></td>
      <td><span class="type-badge ${typeClass(it.issuetype)}">${it.issuetype||'—'}</span></td>
      <td><span class="prio-badge ${prioClass(it.priority)}">${it.priority||'—'}</span></td>
      <td><span class="status-badge ${esentireStatusClass(it.status)}">${it.status||'—'}</span></td>
      <td><div class="assignee-cell"><div class="avatar" style="background:${ac}">${init}</div>${it.assignee||'Unassigned'}</div></td>
      <td class="date-cell">${fmtDatetime(it.created)}</td>
      <td class="date-cell">${fmtDatetime(it.updated)}</td>
      <td><a class="wi-key" href="${JIRA_BASE}${it.key}" target="_blank" rel="noopener">↗</a></td>
    </tr>`;
  }).join('');

  /* ─── Build full content HTML ────────────────────────────── */
  const html = `
  <div class="ws-wrap">
    <div class="ws-header">
      <div>
        <div class="ws-brand-main">eSentire Alert</div>
        <div class="ws-brand-sub">Weekly Summary</div>
      </div>
      <div class="ws-meta">
        <div class="ws-meta-row">Reporting Period</div>
        <div class="ws-meta-val">${fmtD(weekStart)} – ${fmtD(weekEnd)}</div>
        <div class="ws-meta-row">Classification</div>
        <div class="ws-meta-val">eSentire Alert</div>
        <div class="ws-meta-row">Generated</div>
        <div class="ws-meta-val">${fmtD(dataUpdated)}</div>
      </div>
    </div>
    <div class="ws-kpi-grid">
      <div class="ws-kpi kpi-total"><span class="ws-kpi-num">${weekTotal}</span><span class="ws-kpi-lbl">Total Tickets</span></div>
      <div class="ws-kpi kpi-open"><span class="ws-kpi-num">${weekOpen}</span><span class="ws-kpi-lbl">Open</span></div>
      <div class="ws-kpi kpi-closed"><span class="ws-kpi-num">${weekClosed}</span><span class="ws-kpi-lbl">Closed / Completed</span></div>
      <div class="ws-kpi kpi-action"><span class="ws-kpi-num">${weekAction}</span><span class="ws-kpi-lbl">Open — Action Required</span></div>
    </div>
    <div class="ws-narrative">${narrative}</div>
    ${investigationNote}
    <div class="ws-bottom">
      <div>
        <div class="ws-section-title">Alert Category Breakdown</div>
        ${catHTML}
      </div>
      <div>
        <div class="ws-section-title">Open Tickets <span>(${weekOpen} Open)</span></div>
        ${openHTML}
      </div>
    </div>
    <div class="ws-footer">
      <div>Cube Content Governance | Information Security | For Internal Use Only</div>
      <div>SOURCE: JIRA · eSentire Portal | CLASSIFICATION: INTERNAL</div>
    </div>
  </div>

  <div class="analytics-label">30-Day Incident Analytics</div>
  <div class="charts-row-3">
    <div class="chart-card"><h3>Incidents by Priority</h3><div class="chart-wrap"><canvas id="priChart"></canvas></div></div>
    <div class="chart-card"><h3>Incidents by Status</h3><div class="chart-wrap"><canvas id="incStatusChart"></canvas></div></div>
    <div class="chart-card"><h3>Incidents by Issue Type</h3><div class="chart-wrap"><canvas id="typeChart"></canvas></div></div>
  </div>

  <div class="timeline-section">
    <div class="timeline-header">
      <h2>🛡️ eSentire Security Incidents — Last 30 Days</h2>
      <div class="tl-controls">
        <input type="search" class="search-input" id="incSearch" placeholder="Search incidents…" oninput="filterIncidents(this.value)" />
        <a class="tl-btn primary" href="${ESENTIRE_URL}" target="_blank" rel="noopener">View in Jira</a>
      </div>
    </div>
    <div class="tl-table-wrap">
      <table class="tl-table" id="incTable">
        <thead><tr>
          <th style="width:36px">#</th>
          <th style="min-width:280px">Incident</th>
          <th>Type</th><th>Priority</th><th>Status</th><th>Assignee</th>
          <th>Created</th><th>Updated</th><th></th>
        </tr></thead>
        <tbody id="incBody">${incRows}</tbody>
      </table>
    </div>
    <div class="tl-footer">
      <div>Live data from <a href="${ESENTIRE_URL}" target="_blank">Jira · eSentire Dashboard</a> · Last 30 days · Auto-refreshes every 5 min</div>
      <div><a href="${ESENTIRE_URL}" target="_blank">Open in Jira ↗</a></div>
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('lastUpdated').textContent = '🔄 Refreshed: '+dataUpdated.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  document.getElementById('itemCount').textContent = `${weekTotal} this week · ${incItems.length} total (30d)`;

  /* ─── eSentire Charts ─────────────────────────────────────── */
  const prioOrder=['P1','P2','P3','P4','P5'];
  const prioColors={P1:'#EF4444',P2:'#F97316',P3:'#F59E0B',P4:'#3B82F6',P5:'#9CA3AF'};
  const prioLabels=prioOrder.filter(p=>prioCounts[p]);
  makeDonut('priChart',prioLabels,prioLabels.map(p=>prioCounts[p]||0),prioLabels.map(p=>prioColors[p]||'#9CA3AF'));

  const incStatusColors={'To Do':'#9CA3AF','In Progress':'#3B82F6','Actioned':'#F59E0B','Completed':'#22C55E'};
  const isLabels=Object.keys(incStatusCounts);
  makeDonut('incStatusChart',isLabels,isLabels.map(l=>incStatusCounts[l]),isLabels.map(l=>incStatusColors[l]||'#9CA3AF'));

  const typeColors={'Alert':'#EF4444','Service Incident':'#7C3AED'};
  const tLabels=Object.keys(typeCounts);
  makeDonut('typeChart',tLabels,tLabels.map(l=>typeCounts[l]),tLabels.map(l=>typeColors[l]||'#9CA3AF'));
}

/* ─── Incident Search ───────────────────────────────────────── */
function filterIncidents(q){
  const lq=q.toLowerCase();
  document.querySelectorAll('#incBody tr').forEach(tr=>{
    tr.style.display=(!lq||tr.textContent.toLowerCase().includes(lq))?'':'none';
  });
}

/* ─── Fetch ─────────────────────────────────────────────────── */
async function loadData(forceRefresh=false){
  const btn=document.getElementById('refreshBtn');
  if(btn) btn.classList.add('spinning');
  try{
    const res=await fetch(`data-esentire.json?t=${Date.now()}`,{cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    render(await res.json());
  }catch(err){
    document.getElementById('content').innerHTML=
      `<div class="error-box">&#9888; Could not load data: ${err.message}<br><br>If running locally, open via a web server (not file://).<br>On GitHub Pages, data refreshes automatically every 5 min via GitHub Actions.</div>`;
  }finally{
    if(btn) btn.classList.remove('spinning');
  }
}

/* ─── Drawer ────────────────────────────────────────────────── */
function showDrawer(it){ if(!it) return; document.getElementById('drawerKey').textContent=it.key; document.getElementById('drawerTitle').textContent=it.summary; document.getElementById('drawerPanels').innerHTML='<div class="drawer-empty">No additional detail panels for this incident.</div><a class="drawer-jira-link" href="'+it.url+'" target="_blank" rel="noopener">🔗 Open in Jira</a>'; document.getElementById('detailDrawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('detailDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }

/* ─── Init ──────────────────────────────────────────────────── */
document.getElementById('navDate').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
loadData();
</script>
</body>
</html>

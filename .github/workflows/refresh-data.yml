name: Refresh Jira Data

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes
  workflow_dispatch:           # manual trigger button in GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Jira data
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python3 fetch_data.py

      - name: Commit and push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data-infosec.json data-infra.json data-content.json \
                  data-techops.json data-midmarket.json data-dataai.json data-esentire.json
          git diff --cached --quiet || git commit -m "data: auto-refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
